# Probot Settings — https://probot.github.io/apps/settings/
# Applied automatically on every push to main.
# Reference: .claude/skills/devops/SKILL.md § "Settings as Code"

repository:
  name: inkwell
  description: AI-powered browser-based markdown Writing Studio
  homepage: https://linnienaryshkin.github.io/inkwell/
  topics:
    - writing
    - markdown
    - react
    - fastapi
    - typescript

  # Disable merge commits — squash and rebase remain available (GitHub defaults)
  allow_merge_commit: false

labels:
  - name: bug
    color: "d73a4a"
    description: Something isn't working
  - name: enhancement
    color: "a2eeef"
    description: New feature or request
  - name: refined
    color: "0075ca"
    description: Issue has a technical spec — ready to implement
  - name: wip
    color: "fbca04"
    description: Work in progress — not ready for review
  - name: auth
    color: "bfd4f2"
    description: Authentication and session management
  - name: articles
    color: "c5def5"
    description: Article management (create, rename, delete, list)
  - name: editor
    color: "d4edda"
    description: Monaco editor features
  - name: versioning
    color: "e4e669"
    description: Version history and diff features
  - name: linting
    color: "f9d0c4"
    description: Content linting and style analysis
  - name: publishing
    color: "d4edda"
    description: Publishing and distribution features
  - name: sharing
    color: "c5def5"
    description: Sharing and preview features
  - name: settings
    color: "e4e669"
    description: Repository or app configuration
  - name: documentation
    color: "0075ca"
    description: Improvements or additions to documentation

branches:
  - name: main
    protection:
      required_status_checks:
        strict: true
        contexts:
          - ui-build
          - ui-format
          - ui-lint
          - ui-security
          - ui-test
          - ui-types
      enforce_admins: false
      required_pull_request_reviews: null
      restrictions: null
      allow_force_pushes: false
      allow_deletions: false
