name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ui-install:
    name: ui-install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: ui/node_modules
          key: node-modules-${{ github.sha }}

  ui-lint:
    name: ui-lint
    needs: ui-install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: ui/node_modules
          key: node-modules-${{ github.sha }}

      - name: Check ESLint
        run: npm run lint:check

  ui-format:
    name: ui-format
    needs: ui-install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: ui/node_modules
          key: node-modules-${{ github.sha }}

      - name: Check Prettier formatting
        run: npm run format:check

  ui-types:
    name: ui-types
    needs: ui-install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: ui/node_modules
          key: node-modules-${{ github.sha }}

      - name: Check TypeScript
        run: npm run types:check

  ui-test:
    name: ui-test
    needs: ui-install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: ui/node_modules
          key: node-modules-${{ github.sha }}

      - name: Run tests
        run: npm run test:coverage

  ui-security:
    name: ui-security
    needs: ui-install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: ui/node_modules
          key: node-modules-${{ github.sha }}

      - name: Audit dependencies
        run: npm run security

  ui-build:
    name: ui-build
    needs: ui-install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: ui/node_modules
          key: node-modules-${{ github.sha }}

      - name: Build
        run: npm run build

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui/dist

  api-check:
    name: api-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check app/ tests/

      - name: Test
        run: uv run pytest tests/ -v
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID || 'ci-placeholder' }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET || 'ci-placeholder' }}
          GITHUB_CALLBACK_URL: ${{ secrets.GITHUB_CALLBACK_URL || 'http://localhost:8000/auth/callback' }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'ci-placeholder-secret' }}
          ENVIRONMENT: development

  ui-deploy:
    name: ui-deploy
    needs: [ui-lint, ui-format, ui-types, ui-test, ui-build, ui-security]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
