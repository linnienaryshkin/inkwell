name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ui-install:
    name: ui-install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: task install-ci

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: ui/node_modules
          key: node-modules-${{ github.sha }}

  ui-lint:
    name: ui-lint
    needs: ui-install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: ui/node_modules
          key: node-modules-${{ github.sha }}

      - name: Check ESLint
        run: task lint-check

  ui-format:
    name: ui-format
    needs: ui-install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: ui/node_modules
          key: node-modules-${{ github.sha }}

      - name: Check Prettier formatting
        run: task format-check

  ui-types:
    name: ui-types
    needs: ui-install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: ui/node_modules
          key: node-modules-${{ github.sha }}

      - name: Check TypeScript
        run: task types-check

  ui-test:
    name: ui-test
    needs: ui-install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: ui/node_modules
          key: node-modules-${{ github.sha }}

      - name: Run tests
        run: task test-coverage

  ui-security:
    name: ui-security
    needs: ui-install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: ui/node_modules
          key: node-modules-${{ github.sha }}

      - name: Audit dependencies
        run: task security

  ui-build:
    name: ui-build
    needs: ui-install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: ui/node_modules
          key: node-modules-${{ github.sha }}

      - name: Build
        run: task build

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui/dist

  api-check:
    name: api-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        run: uv python install

      - name: Install dependencies
        run: task install

      - name: Lint
        run: task lint-check

      - name: Test
        run: task test

  ui-deploy:
    name: ui-deploy
    needs: [ui-lint, ui-format, ui-types, ui-test, ui-build, ui-security]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
