# Consolidated CI/CD Workflow
#
# This workflow enforces code quality and deploys to GitHub Pages.
# It runs on all pushes and pull requests to main, using intelligent change detection
# to only run relevant quality gates for the code that changed.
#
# Job Flow:
# 1. detect-changes: Analyzes which parts changed (ui/, api/, or both)
#    - For PRs: Compares against merge base
#    - For pushes: Compares against previous commit
#    - Outputs: ui=true/false, api=true/false
#
# 2. Conditional Gates (run in parallel if needed):
#    - ui-quality-gate: Runs only if ui/ code changed
#      Steps: install → lint → format → types → test → security → build
#      On main: Also uploads dist/ artifact for deployment
#
#    - api-quality-gate: Runs only if api/ code changed
#      Steps: install → lint → format → test → security
#
# 3. Deployment (main branch only with UI changes):
#    - ui-deploy: Waits for ui-quality-gate, deploys to GitHub Pages
#
# Why this approach:
# - Avoids running unnecessary jobs (API changes don't trigger UI tests)
# - Works reliably for both PRs and pushes
# - Handles initial commits and force pushes correctly
# - Single source of truth for change detection
#
# Required Status Checks (branch protection):
# - ui-quality-gate
# - api-quality-gate
# These must pass before merging, but only run if their code changed.
#
# To modify:
# 1. For new checks: Add step to job, update ui/Taskfile.yml or api/Taskfile.yml
# 2. For new required checks: Add job here, add to branch protection
# 3. For deployment: Edit ui-deploy job conditions and dependencies

name: cicd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.changes.outputs.ui }}
      api: ${{ steps.changes.outputs.api }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect file changes
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # For PRs, compare against the merge base
            git fetch origin ${{ github.base_ref }}
            BASE_REF="origin/${{ github.base_ref }}"
          else
            # For pushes, compare against the previous commit
            BASE_REF="${{ github.event.before }}"
          fi

          UI_CHANGES=$(git diff --name-only $BASE_REF HEAD | grep -c "^ui/" || true)
          API_CHANGES=$(git diff --name-only $BASE_REF HEAD | grep -c "^api/" || true)

          echo "ui=$([ "$UI_CHANGES" -gt 0 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "api=$([ "$API_CHANGES" -gt 0 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

  ui-quality-gate:
    name: ui-quality-gate
    needs: detect-changes
    if: needs.detect-changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: task install

      - name: Check ESLint
        run: task lint-check

      - name: Check Prettier formatting
        run: task format-check

      - name: Check TypeScript
        run: task types-check

      - name: Run tests
        run: task test-coverage

      - name: Audit dependencies
        run: task security

      - name: Build
        run: task build

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui/dist

  api-quality-gate:
    name: api-quality-gate
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        run: uv python install

      - name: Install dependencies
        run: task install

      - name: Lint
        run: task lint-check

      - name: Format check
        run: task format-check

      - name: Test
        run: task test-coverage

      - name: Security audit
        run: task security

  ui-deploy:
    name: ui-deploy
    needs: [detect-changes, ui-quality-gate]
    if: github.ref == 'refs/heads/main' && needs.detect-changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
