version: "3"

tasks:
  install:
    desc: Install API dependencies
    cmds:
      - test -f .env || cp .env.example .env
      - uv sync --extra dev

  rest-dev:
    desc: Start FastAPI REST server at localhost:8000
    cmds:
      - uv run uvicorn app.main_rest:app --reload --env-file .env

  mcp-dev:
    desc: Start FastMCP MCP server on stdio
    cmds:
      - uv run python -m app.main_mcp

  test:
    desc: Run pytest tests
    cmds:
      - uv run --env-file .env.example pytest tests/ -v

  lint:
    desc: Lint API code with ruff (auto-fix)
    cmds:
      - uv run ruff check --fix app/ tests/

  lint-check:
    desc: Lint API code with ruff (read-only)
    cmds:
      - uv run ruff check app/ tests/

  format:
    desc: Auto-format API code with ruff
    cmds:
      - uv run ruff format app/ tests/

  format-check:
    desc: Check API formatting with ruff (read-only)
    cmds:
      - uv run ruff format --check app/ tests/

  security:
    desc: Audit Python dependencies for known vulnerabilities
    cmds:
      - uv run --with pip-audit pip-audit

  quality-gate:
    desc: Run all API quality checks in sequence
    cmds:
      - task: lint-check
      - task: format-check
      - task: test
      - task: security

  lab:
    desc: Start JupyterLab for API development
    cmds:
      - uv run jupyter lab
