name: api-ci

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/api-ci.yml"

jobs:
  api-quality-gate:
    name: api-quality-gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        run: uv python install

      - name: Install dependencies
        run: task install

      - name: Lint
        run: task lint-check

      - name: Format check
        run: task format-check

      - name: Test
        run: task test

      - name: Security audit
        run: task security
