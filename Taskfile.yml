version: "3"

includes:
  ui:
    taskfile: ./ui/Taskfile.yml
    dir: ./ui
  api:
    taskfile: ./api/Taskfile.yml
    dir: ./api

tasks:
  install:
    desc: Install all dependencies (ui + api)
    cmds:
      - task: ui:install
      - chmod +x .husky/pre-commit
      - chmod +x .husky/commit-msg
      - chmod +x scripts/git-lint.sh
      - chmod +x scripts/file-lint.sh
      - task: api:install

  dev:
    desc: Start all dev servers concurrently (REST API, UI)
    deps:
      - api:rest-dev
      - ui:dev

  quality-gate:
    desc: Run all quality checks (ui then api) in sequence
    cmds:
      - task: ui:quality-gate
      - task: api:quality-gate

  git-lint:
    desc: Validate branch name (current branch, or use BRANCH=<name>)
    cmds:
      - |
        BRANCH={{.BRANCH}}
        if [ -z "$BRANCH" ]; then
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
        fi
        ./scripts/git-lint.sh branch "$BRANCH"

  git-lint-commit:
    desc: Validate a single commit message file (MSG=<path>)
    cmds:
      - ./scripts/git-lint.sh commit-msg "{{.MSG}}"

  git-lint-pr:
    desc: Validate all commits in PR range (BASE=<commit> HEAD=<commit>)
    cmds:
      - ./scripts/git-lint.sh pr-commits "{{.BASE}}" "{{.HEAD}}"

  claude:
    desc: Run AI code assistant
    cmds:
      - claude
      # - codemie-claude
