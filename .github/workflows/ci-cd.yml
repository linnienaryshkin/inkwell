name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ui-quality-gate:
    name: ui-quality-gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: task install-ci

      - name: Check ESLint
        run: task lint-check

      - name: Check Prettier formatting
        run: task format-check

      - name: Check TypeScript
        run: task types-check

      - name: Run tests
        run: task test-coverage

      - name: Audit dependencies
        run: task security

      - name: Build
        run: task build

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui/dist

  api-quality-gate:
    name: api-quality-gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        run: uv python install

      - name: Install dependencies
        run: task install

      - name: Lint
        run: task lint-check

      - name: Format check
        run: task format-check

      - name: Test
        run: task test

      - name: Security audit
        run: task security

  ui-deploy:
    name: ui-deploy
    needs: [ui-quality-gate]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
