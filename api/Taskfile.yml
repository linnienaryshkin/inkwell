version: "3"

tasks:
  install:
    desc: Install API dependencies
    cmds:
      - test -f .env || cp .env.example .env
      - uv sync --extra dev

  rest-dev:
    desc: Start FastAPI REST server at localhost:8000
    cmds:
      - uv run uvicorn app.main_rest:app --reload --env-file .env

  test:
    desc: Run pytest tests
    cmds:
      - uv run --env-file .env.example pytest tests/ -v

  test-coverage:
    desc: Run pytest tests with 90% coverage threshold
    cmds:
      - uv run --env-file .env.example pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=90

  lint:
    desc: Lint API code with Ruff (semantic/static checks; auto-fix where safe)
    cmds:
      - uv run ruff check --fix app/ tests/ lab/

  lint-check:
    desc: Lint API code with Ruff (read-only semantic/static checks)
    cmds:
      - uv run ruff check app/ tests/ lab/

  format:
    desc: Auto-format API code with Ruff formatter (layout/style normalization)
    cmds:
      - uv run ruff format app/ tests/ lab/

  format-check:
    desc: Check API formatting with Ruff formatter (read-only)
    cmds:
      - uv run ruff format --check app/ tests/ lab/

  file-naming-check:
    desc: Check Python file and folder names follow snake_case/lowercase conventions
    cmds:
      - sh ../scripts/file-lint.sh api

  types-check:
    desc: Type-check API code with mypy (no output files)
    cmds:
      - uv run mypy app/ tests/ lab/

  security:
    desc: Audit Python dependencies for known vulnerabilities
    cmds:
      # CVE-2026-3219 affects pip itself. pip 26.0.1 is already the latest release and no
      # patched version exists yet, so the vulnerability cannot be remediated by upgrading.
      - uv run --with pip-audit pip-audit --ignore-vuln CVE-2026-3219

  quality-gate:
    desc: Run all API quality checks in sequence
    deps:
      - install
    cmds:
      - task: lint-check
      - task: format-check
      - task: file-naming-check
      - task: test-coverage
      - task: types-check
      - task: security

  lab:
    desc: Start JupyterLab for API development
    cmds:
      - uv run jupyter lab

  langgraph-studio:
    desc: Start Web-based LangGraph Studio for visual agent development and debugging
    cmds:
      - uv run langgraph dev --no-browser
